<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF"/>
      <stop offset="50%" style="stop-color:#1E3A8A"/>
      <stop offset="100%" style="stop-color:#1E3A5F"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#93C5FD"/>
      <stop offset="100%" style="stop-color:#BFDBFE"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="200" fill="rgba(255,255,255,0.03)"/>
  <circle cx="1100" cy="500" r="150" fill="rgba(255,255,255,0.03)"/>
  <circle cx="150" cy="550" r="120" fill="rgba(255,255,255,0.03)"/>
  <!-- Accent line -->
  <rect x="80" y="200" width="80" height="4" rx="2" fill="url(#accent)"/>
  <!-- Brand text -->
  <text x="80" y="170" font-family="'Noto Sans KR', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#93C5FD" letter-spacing="2">DIGITAL BUSINESS STRATEGY</text>
  <!-- Title Line 1 -->
  <text x="80" y="280" font-family="'Noto Sans KR', 'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="900" fill="#FFFFFF" letter-spacing="-1">디지털 시대의</text>
  <!-- Title Line 2 -->
  <text x="80" y="360" font-family="'Noto Sans KR', 'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="900" fill="#FFFFFF" letter-spacing="-1">비즈니스 전략을 설계하다</text>
  <!-- Subtitle -->
  <text x="80" y="420" font-family="'Noto Sans KR', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="400" fill="rgba(255,255,255,0.7)">디지털 트랜스포메이션 · 플랫폼 · AI · 핀테크 · 마케팅</text>
  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.2)"/>
  <!-- Footer text -->
  <text x="80" y="617" font-family="'Noto Sans KR', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.8)">digitalbiz.dreamitbiz.com</text>
  <!-- DreamIT Biz logo text -->
  <text x="1120" y="617" font-family="'Noto Sans KR', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.5)" text-anchor="end">DreamIT Biz</text>
  <!-- Grid icons representing topics -->
  <g transform="translate(850, 180)" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2">
    <!-- Platform icon -->
    <rect x="0" y="0" width="60" height="60" rx="12"/>
    <circle cx="30" cy="30" r="15"/>
    <!-- Data icon -->
    <rect x="80" y="0" width="60" height="60" rx="12"/>
    <rect x="95" y="15" width="8" height="30" rx="2"/>
    <rect x="108" y="22" width="8" height="23" rx="2"/>
    <rect x="121" y="10" width="8" height="35" rx="2"/>
    <!-- AI icon -->
    <rect x="160" y="0" width="60" height="60" rx="12"/>
    <circle cx="190" cy="25" r="10"/>
    <path d="M180,42 Q190,35 200,42"/>
    <!-- Marketing icon -->
    <rect x="0" y="80" width="60" height="60" rx="12"/>
    <path d="M15,130 L30,100 L45,120"/>
    <!-- Fintech icon -->
    <rect x="80" y="80" width="60" height="60" rx="12"/>
    <text x="110" y="118" text-anchor="middle" font-size="24" fill="rgba(255,255,255,0.15)" stroke="none">$</text>
    <!-- Global icon -->
    <rect x="160" y="80" width="60" height="60" rx="12"/>
    <circle cx="190" cy="110" r="18"/>
    <line x1="172" y1="110" x2="208" y2="110"/>
    <path d="M190,92 Q180,110 190,128" fill="none"/>
  </g>
</svg>
